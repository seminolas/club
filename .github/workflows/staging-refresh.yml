name: Refresh staging D1 from prod

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Export prod D1 (schema + data)
        run: wrangler d1 export club-prod --remote --output prod-dump.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Wipe staging D1
        run: |
          for table in match_sets matches box_players boxes attendees session_ranks session_lb sessions club_admins players clubs d1_migrations; do
            wrangler d1 execute club-staging --remote --command "DROP TABLE IF EXISTS $table"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Load prod dump into staging
        run: wrangler d1 execute club-staging --remote --file prod-dump.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

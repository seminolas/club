name = "club"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".."          # repo root — serves index.html, js/, data/

[[d1_databases]]
binding = "DB"
database_name = "club-prod"
database_id = "dc014559-276f-4c9b-8aef-4071b4da9a3c"

[vars]
HC_CLUB_ID = "northlandbadminton"
HC_CLUB_SLUG = "northland-badminton"

[observability.logs]
enabled = true
invocation_logs = true

[env.staging]
name = "club-api-staging"

[env.staging.vars]
HC_CLUB_ID = "northlandbadminton"
HC_CLUB_SLUG = "northland-badminton"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "club-staging"
database_id = "ffcff689-6918-40f3-bde8-78502d18d0b5"
